<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyFlow Planner</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="text-gray-800 min-h-screen transition-all duration-500"
    style="background-image: url('https://images.unsplash.com/photo-1497864149936-d3163f0c0f4b'); background-size: cover; background-position: center; background-attachment: fixed;"
  >
   
    <nav-
      class="bg-blue-900 bg-opacity-=35 shadow p-4 flex justify-around items-center"
    >
      <h1 class="text-3xl font-bold text-white">StudyFlow</h1>

      <div id="hamburger" class="md:hidden text-2xl cursor-pointer">☰</div>

      <ul id="navLinks" class="hidden md:flex gap-6 font-medium">
        <li class="nav-item text-white cursor-pointer">Home</li>
        <li class="nav-item text-white cursor-pointer">Tasks</li>

        <li class="relative">
          <span id="dropdownBtn" class="cursor-pointer">Resources ▼</span>
          <ul
            id="dropdownMenu"
            class="hidden absolute bg-white mt-2 p-2 rounded shadow"
          >
            <li class="p-1 hover:bg-gray-200">Study Tips</li>
            <li class="p-1 hover:bg-gray-200">Time Management</li>
          </ul>
        </li>

        <li class="nav-item cursor-pointer">Profile</li>
      </ul>
    </nav>

   
    <main class="p-6 space-y-10">
      
      <section
        class="bg-white bg-opacity-90 p-6 rounded-xl shadow-lg flex flex-col md:flex-row items-center gap-6"
      >
        <div class="flex-1">
          <h2 class="text-xl font-bold text-blue-600">
            Plan Your Day Smarter
          </h2>
          <p class="mt-2 text-gray-700">
            Stay organized, manage your study tasks, and keep track .
            
          </p>
        </div>

        <img
          src="https://media.istockphoto.com/id/1432935110/photo/woman-works-on-laptop-remotely-in-house-on-nature.jpg?s=1024x1024&w=is&k=20&c=oVxKAzwrJQyQrDWkxNAHCkauOfmnNu4sXHIcoAJcz1g="
          class="h-20 w-25 md: rounded-md shadow"
        />
      </section>


      <section class="bg-blue-900 p-0 rounded shaadow">
        <p id="text">Success starts with a well-planned day.</p>

        <button id="changeTextBtn"
               class="bg-blue-500 text-white px-2 py-2 rounded mt-4 hover:bg-blue-600 transition"
        >
          Motivate Me
        </button>
        <button id="themeToggle"
                class="bg-gray-800 text-white px-4 py-2 rounded mt-2 ml-2">
              Toggle Theme
            </button>

          <section class="bg-white p-4 rounded shadow">
            <input id="userInput"
                  type="text"
                  placeholder="Enter today's goal"
                  class="border p-2 mr-2"
            
      </section>
      </section>  

      <button id="displayBtn"
              class="bg-green-500 text-white px-4 py-2 rounded"
      >
        Add Goal
      </button>
      <p id="displayOutput" class="mt-2 font-semibold text-blue-600"></p>
      </section>

      <section class="bg-white p-4 rounded shadow">
        <input 
          id="search"
          type="text"
          placeholder="Search tasks ..."
          class="border p-2 mb-2 w-full"
        />  

        <div class="flex gap-2"
          <input 
            id="itemInput"
            type="text"
            placeholder="Enter a new task"
            class="border p-2 flex-1"
          />
          <button id="addItemBtn" class="bg-blue-500 text-white px-4 py-2 rounded">
            Add 
          </button>
        </div>

        <ul id="itemList" class="mt-4 space-y-2"></ul>
        </section>
